name: Build and Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Parse version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Release tag must be in format v1.2.3 (pre-release suffixes are allowed)." >&2
            exit 1
          fi

          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Install Windows CGO toolchain
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Add Windows GCC to PATH
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build binaries
        shell: bash
        env:
          CGO_ENABLED: 1
          CC: gcc
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          target_os="${{ matrix.goos }}"
          target_arch="${{ matrix.goarch }}"
          output="trusty_${version}_${target_os}_x86_64${{ matrix.ext }}"

          mkdir -p dist
          echo "Building ${output} (runner=${{ runner.os }})"

          export GOOS="${target_os}"
          export GOARCH="${target_arch}"

          if [[ "$target_os" == "windows" ]]; then
            go build -trimpath -ldflags "-s -w -H=windowsgui -linkmode external -extldflags '-static -static-libgcc -static-libstdc++ -Wl,-Bstatic -lwinpthread -Wl,-Bdynamic'" -o "dist/${output}" .

            # Ensure it does not depend on non-system DLLs.
            mapfile -t dlls < <(objdump -p "dist/${output}" | awk -F': ' '/DLL Name/ {print tolower($2)}')
            echo "Windows DLL imports:"
            printf '%s\n' "${dlls[@]}"

            forbidden_regex='^(libgcc_s_seh-1\.dll|libstdc\+\+-6\.dll|libwinpthread-1\.dll)$'
            forbidden=()
            for dll in "${dlls[@]}"; do
              if [[ "$dll" =~ $forbidden_regex ]]; then
                forbidden+=("$dll")
              fi
            done

            if (( ${#forbidden[@]} > 0 )); then
              echo "Binary is not fully self-contained. Forbidden runtime DLL imports found: ${forbidden[*]}" >&2
              exit 1
            fi

            allowed_regex='^(advapi32\.dll|comctl32\.dll|comdlg32\.dll|dwmapi\.dll|gdi32\.dll|imm32\.dll|kernel32\.dll|msvcrt\.dll|ntdll\.dll|ole32\.dll|oleaut32\.dll|opengl32\.dll|setupapi\.dll|shell32\.dll|shlwapi\.dll|ucrtbase\.dll|user32\.dll|uxtheme\.dll|version\.dll|winmm\.dll|ws2_32\.dll)$'
            unexpected=()
            for dll in "${dlls[@]}"; do
              if [[ ! "$dll" =~ $allowed_regex ]]; then
                unexpected+=("$dll")
              fi
            done

            if (( ${#unexpected[@]} > 0 )); then
              echo "Unexpected Windows DLL dependencies found: ${unexpected[*]}" >&2
              exit 1
            fi
          elif [[ "$target_os" == "linux" ]]; then
            go build -trimpath -ldflags "-s -w" -o "dist/${output}" .

            printf '[Desktop Entry]\nName=Trusty\nType=Application\nExec=./%s\nTerminal=false\nCategories=Utility;\n' "${output}" > "dist/Trusty.desktop"

            tar -C dist -czf "dist/trusty_${version}_linux_x86_64.tar.gz" "${output}" "Trusty.desktop"
            rm -f "dist/Trusty.desktop"
          else
            echo "Unsupported matrix.goos: $target_os" >&2
            exit 1
          fi

          ls -la dist

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          overwrite_files: true

  publish-winget:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !github.event.release.draft && vars.WINGET_PACKAGE_IDENTIFIER != '' }}
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}

    steps:
      - name: Skip WinGet publish (missing token)
        if: ${{ env.WINGET_TOKEN == '' }}
        run: echo "WINGET_TOKEN is not configured; skipping WinGet publish"

      - name: Publish release to WinGet
        if: ${{ env.WINGET_TOKEN != '' }}
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: ${{ vars.WINGET_PACKAGE_IDENTIFIER }}
          release-tag: ${{ github.event.release.tag_name }}
          installers-regex: '_windows_x86_64\.exe$'
          token: ${{ env.WINGET_TOKEN }}
