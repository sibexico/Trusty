name: Build and Release Binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            runner: windows-latest
            goarch: amd64
            ext: .exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Parse version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Release tag must be in format v1.2.3 (pre-release suffixes are allowed)." >&2
            exit 1
          fi

          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Install Windows CGO toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: 1
          CC: gcc
        run: |
          set -euo pipefail
          mkdir -p dist

          output="trusty_${{ steps.version.outputs.version }}_${{ matrix.goos }}_x86_64${{ matrix.ext }}"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" go build -trimpath -ldflags="-s -w" -o "dist/${output}" .

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          overwrite_files: true
