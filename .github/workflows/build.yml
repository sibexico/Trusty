name: Build and Release Binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - goos: windows
            runner: windows-latest
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Parse version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Release tag must be in format v1.2.3 (pre-release suffixes are allowed)." >&2
            exit 1
          fi

          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Install Windows CGO toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Add Windows GCC to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Fyne CLI
        shell: bash
        run: |
          set -euo pipefail
          go install fyne.io/tools/cmd/fyne@latest

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: 1
          CC: gcc
        run: |
          set -euo pipefail
          mkdir -p dist

          target_os="${{ matrix.goos }}"
          echo "Building for matrix.goos=${target_os}, runner.os=${{ runner.os }}"

          if [[ "${target_os}" == "windows" ]]; then
            export GOFLAGS="-ldflags=-H=windowsgui"
          fi

          fyne_bin="$(go env GOPATH)/bin/fyne"
          "$fyne_bin" package --release --target "${target_os}" --name Trusty --appID com.github.sibexico.trusty

          shopt -s nullglob
          candidates=()
          artifacts=()
          case "${target_os}" in
            linux)
              candidates=(Trusty*.AppImage trusty*.AppImage Trusty*.tar.xz trusty*.tar.xz Trusty*.tar.gz trusty*.tar.gz Trusty trusty)
              ;;
            windows)
              candidates=(Trusty*.exe trusty*.exe)
              ;;
            *)
              echo "Unsupported matrix.goos: ${target_os}" >&2
              exit 1
              ;;
          esac

          for pattern in "${candidates[@]}"; do
            matches=( ${pattern} )
            if [[ ${#matches[@]} -gt 0 ]]; then
              artifacts+=("${matches[@]}")
            fi
          done

          if [[ ${#artifacts[@]} -eq 0 ]]; then
            echo "Expected package artifact was not generated by fyne package" >&2
            ls -la
            exit 1
          fi

          echo "Matched artifacts: ${artifacts[*]}"

          artifact="${artifacts[0]}"
          echo "Selected artifact: ${artifact}"
          extension=""
          if [[ "$artifact" == *.* ]]; then
            extension=".${artifact##*.}"
          fi

          output="trusty_${{ steps.version.outputs.version }}_${{ matrix.goos }}_x86_64${extension}"
          cp "$artifact" "dist/${output}"

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          overwrite_files: true
