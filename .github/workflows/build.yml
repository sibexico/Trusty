name: Build and Release Binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Parse version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Release tag must be in format v1.2.3 (pre-release suffixes are allowed)." >&2
            exit 1
          fi

          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Install Windows CGO toolchain
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Add Windows GCC to PATH
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build binaries
        shell: bash
        env:
          CGO_ENABLED: 1
          CC: gcc
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          target_os="${{ matrix.goos }}"
          target_arch="${{ matrix.goarch }}"
          output="trusty_${version}_${target_os}_x86_64${{ matrix.ext }}"

          mkdir -p dist
          echo "Building ${output} (runner=${{ runner.os }})"

          export GOOS="${target_os}"
          export GOARCH="${target_arch}"

          if [[ "$target_os" == "windows" ]]; then
            go build -trimpath -ldflags "-s -w -H=windowsgui" -o "dist/${output}" .
          elif [[ "$target_os" == "linux" ]]; then
            go build -trimpath -ldflags "-s -w" -o "dist/${output}" .

            cat > "dist/Trusty.desktop" <<EOF
[Desktop Entry]
Name=Trusty
Type=Application
Exec=./${output}
Terminal=false
Categories=Utility;
EOF

            tar -C dist -czf "dist/trusty_${version}_linux_x86_64.tar.gz" "${output}" "Trusty.desktop"
            rm -f "dist/Trusty.desktop"
          else
            echo "Unsupported matrix.goos: $target_os" >&2
            exit 1
          fi

          ls -la dist

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          overwrite_files: true
