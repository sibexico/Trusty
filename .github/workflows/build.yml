name: Build and Release Binaries

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [windows, linux]
        goarch: [amd64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.18'
      - name: Build binary
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/trusty-${{ matrix.goos }}-${{ matrix.goarch }}
      - name: Upload binaries to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/trusty-${{ matrix.goos }}-${{ matrix.goarch }}
